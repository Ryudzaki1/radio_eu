services:
  ru-postgres:
    image: postgres:16-alpine
    container_name: radio-local-ru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radio}
      POSTGRES_USER: ${POSTGRES_USER:-radio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - local-ru-postgres:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro

  ru:
    build: .
    container_name: radio-local-ru
    restart: unless-stopped
    depends_on:
      ru-postgres:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-127.0.0.1:3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      POSTGRES_HOST: ru-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-radio}
      POSTGRES_USER: ${POSTGRES_USER:-radio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      MUSIC_DIR: /music
      LIVE_MUSIC_DIR: /music/live
      PLAY_MUSIC_DIR: /music/play
      CACHE_DIR: /cache/announcements
      ARCHIVE_DIR: /cache/archive
      LOG_DIR: /cache/logs
      ADMIN_CONFIG_PATH: /cache/config/admin.json
      FACT_LOG_PATH: /cache/config/fact-log.json
      TOPIC_CYCLE_STATE_PATH: /cache/config/topic-cycle.json
      LISTENER_STORE_PATH: /cache/config/listeners.json
      PUBLIC_RADIO_URL: ${PUBLIC_RADIO_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LISTENER_API_TOKEN: ${LISTENER_API_TOKEN}
      LISTENER_ALLOWED_TELEGRAM_IDS: ${LISTENER_ALLOWED_TELEGRAM_IDS:-}
      LISTENER_ALLOWED_USERNAMES: ${LISTENER_ALLOWED_USERNAMES:-}
      LISTENER_UNLIMITED_TELEGRAM_IDS: ${LISTENER_UNLIMITED_TELEGRAM_IDS:-}
      LISTENER_UNLIMITED_USERNAMES: ${LISTENER_UNLIMITED_USERNAMES:-}
      LISTENER_ADMIN_TELEGRAM_IDS: ${LISTENER_ADMIN_TELEGRAM_IDS:-}
      LISTENER_ADMIN_USERNAMES: ${LISTENER_ADMIN_USERNAMES:-}
    volumes:
      - ./music:/music
      - local-ru-cache:/cache

  eu:
    build: .
    container_name: radio-local-eu
    restart: unless-stopped
    depends_on:
      ru:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RADIO_INTERNAL_URL: http://ru:3000
      PUBLIC_RADIO_URL: ${PUBLIC_RADIO_URL:-http://localhost:3000}
      PUBLIC_SERVER_IP: ${PUBLIC_SERVER_IP:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_BOT_TOKEN: ${LOCAL_TELEGRAM_BOT_TOKEN:-}
      LISTENER_API_TOKEN: ${LISTENER_API_TOKEN}
      BOT_ALLOWED_TELEGRAM_IDS: ${BOT_ALLOWED_TELEGRAM_IDS:-}
      BOT_ALLOWED_USERNAMES: ${BOT_ALLOWED_USERNAMES:-}
      BOT_ADMIN_TELEGRAM_IDS: ${BOT_ADMIN_TELEGRAM_IDS:-}
      BOT_ADMIN_USERNAMES: ${BOT_ADMIN_USERNAMES:-}
      BOT_NOTIFY_CHAT_IDS: ${BOT_NOTIFY_CHAT_IDS:-}
      BOT_LINK_STATE_PATH: /cache/config/bot-link.json
      PUBLIC_URL_STATE_PATH: /cache/config/public-url.json
      PUBLIC_URL_HEALTH_STATE_PATH: /cache/config/public-url-health.json
      PUBLIC_URL_HEALTH_INTERVAL_MS: ${PUBLIC_URL_HEALTH_INTERVAL_MS:-300000}
      LISTENER_STORE_PATH: /cache/config/listeners.json
    volumes:
      - local-eu-cache:/cache
    command:
      - sh
      - -lc
      - |
        if [ -n "$$TELEGRAM_BOT_TOKEN" ]; then
          exec node bot/bot.js
        fi
        echo "LOCAL_TELEGRAM_BOT_TOKEN is empty; EU role is idle."
        exec tail -f /dev/null
    healthcheck:
      disable: true

volumes:
  local-ru-cache:
  local-ru-postgres:
  local-eu-cache:
